<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حكايتنا الأبدية ❤️</title>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #ff4d6d;
            --secondary-color: #ff758f;
            --bg-color: #fff0f3;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-color);
            margin: 0;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 50px;
        }

        /* قلوب متطايرة في الخلفية */
        .heart-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        /* الأسطر الخمسة بأنيميشن */
        .intro-section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .intro-text {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--primary-color);
            margin: 10px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        /* العداد بحركة نبض */
        #timer-container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 77, 109, 0.2);
            margin: 50px 0;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        .time-unit {
            display: inline-block;
            margin: 0 15px;
            font-size: 1.2rem;
            color: #555;
        }

        .time-unit span {
            display: block;
            font-size: 3rem;
            font-weight: 900;
            color: var(--primary-color);
        }

        /* الكروت بحركة 3D */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            width: 90%;
            max-width: 1000px;
        }

        .card-box {
            perspective: 1000px;
            height: 200px;
            cursor: pointer;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.8s;
            transform-style: preserve-3d;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-radius: 15px;
        }

        .card-box.open .card-inner {
            transform: rotateY(180px);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            font-size: 1.5rem;
            padding: 20px;
            box-sizing: border-box;
        }

        .card-front {
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            color: white;
        }

        .card-back {
            background: white;
            color: var(--primary-color);
            transform: rotateY(180deg);
            border: 2px solid var(--primary-color);
            font-size: 1.2rem;
        }

    </style>
</head>
<body>

    <div class="heart-bg" id="heartContainer"></div>

    <div class="intro-section">
        <div class="intro-text" data-aos="fade-up" data-aos-delay="200">بـحـبـك</div>
        <div class="intro-text" data-aos="fade-up" data-aos-delay="400">بـعـشـقـك</div>
        <div class="intro-text" data-aos="fade-up" data-aos-delay="600">بـتـنـفـسـك</div>
        <div class="intro-text" data-aos="fade-up" data-aos-delay="800">بـهـواكـي</div>
        <div class="intro-text" data-aos="fade-up" data-aos-delay="1000">بـمـوت فـيـكـي</div>
        <p style="margin-top: 20px; color: #888;">(انزل لتحت 👇)</p>
    </div>

    <div id="timer-container" data-aos="zoom-in">
        <h2 style="color: #444;">الوقت الذي قضيناه معاً ❤️</h2>
        <div class="time-unit"><span id="days">0</span> يوم</div>
        <div class="time-unit"><span id="hours">0</span> ساعة</div>
        <div class="time-unit"><span id="minutes">0</span> دقيقة</div>
        <div class="time-unit"><span id="seconds">0</span> ثانية</div>
    </div>

    <div class="cards-grid">
        <div class="card-box" onclick="this.classList.toggle('open')" data-aos="flip-left">
            <div class="card-inner">
                <div class="card-front">أول لقاء 💌</div>
                <div class="card-back">الفرحة الاولي و الاخيرة و عمري مهحسها غير و انا معاكي</div>
            </div>
        </div>
        <div class="card-box" onclick="this.classList.toggle('open')" data-aos="flip-right">
            <div class="card-inner">
                <div class="card-front">ضحكتك ✨</div>
                <div class="card-back">بموت في ضحكتك و بتخليني ديما فرحان و مبتسم</div>
            </div>
        </div>
        <div class="card-box" onclick="this.classList.toggle('open')" data-aos="flip-left">
            <div class="card-inner">
                <div class="card-front">وعد لكِ 💍</div>
                <div class="card-back">هفضل معاكي للابد</div>
            </div>
        </div>
        <div class="card-box" onclick="this.classList.toggle('open')" data-aos="flip-right">
            <div class="card-inner">
                <div class="card-front">سرنا ❤️</div>
                <div class="card-back">ربع سانتي و 15 سنة</div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1200 });

        // إنشاء قلوب تتساقط
        function createHeart() {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.style.position = 'fixed';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = '-20px';
            heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
            heart.style.opacity = Math.random();
            heart.style.transition = 'transform 5s linear, opacity 5s';
            document.getElementById('heartContainer').appendChild(heart);

            setTimeout(() => {
                heart.style.transform = `translateY(110vh) rotate(${Math.random() * 360}deg)`;
            }, 100);

            setTimeout(() => { heart.remove(); }, 6000);
        }
        setInterval(createHeart, 300);

        // تاريخ البداية (غيره لتاريخكم الحقيقي)
        const startDate = new Date(2024, 0, 1); 

        function updateTimer() {
            const now = new Date();
            const diff = now - startDate;
            document.getElementById('days').innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById('hours').innerText = Math.floor((diff / (1000 * 60 * 60)) % 24);
            document.getElementById('minutes').innerText = Math.floor((diff / (1000 * 60)) % 60);
            document.getElementById('seconds').innerText = Math.floor((diff / 1000) % 60);
        }
        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
