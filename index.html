<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حكايتنا</title>
    <style>
        :root {
            --primary-color: #ff4d6d;
            --bg-color: #fff0f3;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: #333;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        /* الأسطر الخمسة المطلوبة */
        .intro-text {
            font-size: 24px;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 30px;
            line-height: 1.6;
        }

        /* العداد */
        #timer {
            background: white;
            padding: 20px;
            border-radius: 15px;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 40px;
        }

        .time-unit {
            display: inline-block;
            margin: 0 10px;
            font-size: 20px;
        }

        .time-unit span {
            display: block;
            font-size: 35px;
            color: var(--primary-color);
        }

        /* الكروت */
        .cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        .card {
            background: var(--primary-color);
            color: white;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.3s;
            position: relative;
            overflow: hidden;
            font-weight: bold;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .card-content {
            display: none;
            position: absolute;
            background: white;
            color: #333;
            width: 100%;
            height: 100%;
            align-items: center;
            justify-content: center;
            padding: 10px;
            box-sizing: border-box;
            border: 2px solid var(--primary-color);
        }

        .card.open .card-content {
            display: flex;
        }
    </style>
</head>
<body>

    <div class="intro-text">
        بـحـبـك <br>
        بـعـشـقـك <br>
        بـتـنـفـسـك <br>
        بـهـواكـي <br>
        بـمـوت فـيـكـي
    </div>

    <div id="timer">
        <h2>الوقت اللي عشناه سوا ❤️</h2>
        <div class="time-unit"><span id="days">0</span> يوم</div>
        <div class="time-unit"><span id="hours">0</span> ساعة</div>
        <div class="time-unit"><span id="minutes">0</span> دقيقة</div>
        <div class="time-unit"><span id="seconds">0</span> ثانية</div>
    </div>

    <div class="cards-container">
        <div class="card" onclick="this.classList.toggle('open')">
            <span>اضغط هنا ❤️</span>
            <div class="card-content">اكتب رسالتك الأولى هنا</div>
        </div>
        <div class="card" onclick="this.classList.toggle('open')">
            <span>هدية ليكِ 🎁</span>
            <div class="card-content">اكتب رسالتك الثانية هنا</div>
        </div>
        <div class="card" onclick="this.classList.toggle('open')">
            <span>سر صغير 🤫</span>
            <div class="card-content">اكتب رسالتك الثالثة هنا</div>
        </div>
        <div class="card" onclick="this.classList.toggle('open')">
            <span>وعد مني 💍</span>
            <div class="card-content">اكتب رسالتك الرابعة هنا</div>
        </div>
    </div>

    <script>
        // ضع تاريخ بداية علاقتكم هنا (السنة، الشهر -1، اليوم)
        // مثال: 1 يناير 2024 تكتب هكذا: (2024, 0, 1)
        const startDate = new Date(2024, 0, 1); 

        function updateTimer() {
            const now = new Date();
            const diff = now - startDate;

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const m = Math.floor((diff / (1000 * 60)) % 60);
            const s = Math.floor((diff / 1000) % 60);

            document.getElementById('days').innerText = d;
            document.getElementById('hours').innerText = h;
            document.getElementById('minutes').innerText = m;
            document.getElementById('seconds').innerText = s;
        }

        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
